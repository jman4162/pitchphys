name: Docs

# Builds the MkDocs Material site and deploys it to the gh-pages branch
# on every push to main. After the first successful run, enable GitHub
# Pages in Settings -> Pages -> Source: "Deploy from a branch" -> gh-pages.
# Site is then live at https://jman4162.github.io/pitchphys/.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # required for mkdocs gh-deploy to push to gh-pages

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so mkdocs gh-deploy can rewrite gh-pages

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pitchphys with viz + docs extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[viz,docs]"

      - name: Configure git for gh-deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build and deploy to gh-pages
        run: mkdocs gh-deploy --force --clean --verbose
