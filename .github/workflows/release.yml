name: Publish to PyPI

# Builds the wheel + sdist on every tag matching v* and publishes to PyPI
# via trusted publishing (OpenID Connect). No PyPI API token secret is
# required — auth is short-lived OIDC negotiated between GitHub Actions
# and PyPI.
#
# Setup: configure a "pending publisher" at
# https://pypi.org/manage/account/publishing/ with:
#   project name   = pitchphys
#   owner          = jman4162
#   repository     = pitchphys
#   workflow       = release.yml
#   environment    = (leave blank; or set to "pypi" and add `environment: pypi` below)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify metadata
        run: |
          python -m pip install twine
          twine check dist/*

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
