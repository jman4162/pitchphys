name: Publish to PyPI

# Builds the wheel + sdist on every tag matching v*, runs twine check,
# and uploads to PyPI. Requires a repo secret PYPI_API_TOKEN scoped to
# the `pitchphys` project.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for trusted publishing if you migrate to it later
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify metadata with twine
        run: twine check dist/*

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
