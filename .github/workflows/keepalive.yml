name: Keep Streamlit Cloud app warm

# Streamlit Cloud's free tier puts apps to sleep after ~7 days of idle.
# This workflow pings the deployed app every 6 days so the first visitor
# never lands on a cold-wake "Yes, get this app back up!" screen.
#
# Setup: after deploying, set a repository variable named STREAMLIT_APP_URL
# (Settings → Secrets and variables → Actions → Variables) to the deployed
# subdomain (e.g. https://pitchphys.streamlit.app). The workflow falls back
# to the placeholder URL if the variable is unset.

on:
  schedule:
    - cron: "0 12 */6 * *"   # every 6 days at 12:00 UTC
  workflow_dispatch:           # allow manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app
        env:
          APP_URL: ${{ vars.STREAMLIT_APP_URL || 'https://pitchphys.streamlit.app' }}
        run: |
          echo "Pinging $APP_URL"
          curl --fail --max-time 90 --silent --show-error "$APP_URL" > /dev/null
          echo "App is reachable."
