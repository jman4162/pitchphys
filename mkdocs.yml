site_name: pitchphys
site_description: Educational Python simulator for baseball pitch aerodynamics, spin, drag, Magnus force, and pitch movement.
site_url: https://jman4162.github.io/pitchphys/
repo_url: https://github.com/jman4162/pitchphys
repo_name: jman4162/pitchphys
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

hooks:
  - scripts/docs_hooks.py

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            separate_signature: true
            members_order: source
            heading_level: 3
            merge_init_into_class: true
  - mkdocs-jupyter:
      include_source: true
      execute: false
      include_requirejs: true

nav:
  - Home: index.md
  - User guide:
      - Physics primer: user-guide/physics-primer.md
      - Coordinates: user-guide/coordinates.md
      - Aerodynamic models: user-guide/aero-models.md
      - Environment & weather: user-guide/environment.md
      - Pitch presets: user-guide/presets.md
  - Tutorials:
      - Overview: tutorials.md
      - "03 — Fastball vs curveball": notebooks/03_magnus_effect_fastball_curveball.ipynb
      - "05 — Active spin vs gyro spin": notebooks/05_active_spin_vs_gyro_spin.ipynb
      - "09 — Build your own pitch": notebooks/09_build_your_own_pitch.ipynb
  - API reference: api.md
  - Contributing: contributing.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - tables
  - footnotes
  - toc:
      permalink: true

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jman4162/pitchphys
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pitchphys/
