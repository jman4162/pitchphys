# Streamlit Cloud / local app theme + behavior.
# Matches the default Plotly trace color (`_PITCH_COLOR_CYCLE[0]`) for
# visual consistency across pages.

[theme]
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f5f5f5"
textColor = "#262730"
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
headless = true
